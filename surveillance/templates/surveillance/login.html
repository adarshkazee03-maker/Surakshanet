<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SurakshaNet</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #0f3d2e 0%, #1D9E75 100%); min-height: 100vh; display: flex; align-items: center; }
    .login-card { background: #fff; border-radius: 16px; padding: 40px 36px; max-width: 400px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .brand-icon { font-size: 2.5rem; color: #1D9E75; }
    .login-card h2 { font-weight: 700; font-size: 1.5rem; }
    .btn-login { background: #1D9E75; color: #fff; font-weight: 600; padding: 10px; }
    .btn-login:hover { background: #178a65; color: #fff; }
  </style>
</head>
<body>
<div class="container">
  <div class="d-flex justify-content-center">
    <div class="login-card">
      <div class="text-center mb-4">
        <div class="brand-icon"><i class="bi bi-shield-check"></i></div>
        <h2>SurakshaNet</h2>
        <p class="text-muted small">Disease Surveillance & Alert System — Nepal</p>
      </div>

      {% if form.errors %}
        <div class="alert alert-danger py-2 small">Invalid username or password.</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100">
          <i class="bi bi-box-arrow-in-right"></i> Sign in
        </button>
      </form>

      <p class="text-center text-muted small mt-4 mb-0">
        Health Informatics Project — HIMS 256<br>
        Tribhuvan University · Department of Health Informatics
      </p>
    </div>
  </div>
</div>
</body>
</html>
